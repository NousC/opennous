name: Bug Report
description: Report a bug in Nous CRM
labels: ["type: bug"]
body:
  - type: markdown
    attributes:
      value: |
        For **installation/setup issues**, please use [Discord](https://discord.gg/2Ph4ZYXw) — GitHub issues are for confirmed bugs only.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Call endpoint X with payload Y
        2. See error Z
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or logs
      description: Paste any relevant error output or screenshots.

  - type: dropdown
    id: component
    attributes:
      label: Which part of the system?
      options:
        - API (REST endpoints)
        - MCP server
        - Frontend
        - Worker / signal ingestion
        - SDK (TypeScript)
        - SDK (Python)
        - Docker / self-hosted setup
        - Other
    validations:
      required: true

  - type: input
    id: node_version
    attributes:
      label: Node.js version
      placeholder: "e.g. 22.1.0"

  - type: dropdown
    id: pr
    attributes:
      label: Are you willing to submit a fix PR?
      options:
        - "Yes"
        - "No"
        - "Maybe, with guidance"
