<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 250" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <!-- panel -->
  <rect x="4" y="4" width="1092" height="242" rx="18" fill="#F8F8F5" stroke="#E8E8E2" stroke-width="1.5"/>

  <!-- divider between open + cloud -->
  <line x1="720" y1="96" x2="720" y2="172" stroke="#E2E2DC" stroke-width="1.5" stroke-dasharray="3 5"/>

  <!-- top brace: open source -->
  <path d="M24 82 Q24 72 32 72 L364 72 Q372 72 372 62 Q372 72 380 72 L712 72 Q720 72 720 82"
        fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  <text x="372" y="50" text-anchor="middle" fill="#10B981" font-size="16" font-weight="700">Nous Open Source</text>

  <!-- bottom brace: cloud -->
  <path d="M24 178 Q24 188 32 188 L538 188 Q546 188 546 198 Q546 188 554 188 L1060 188 Q1068 188 1068 178"
        fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>
  <text x="546" y="218" text-anchor="middle" fill="#7C3AED" font-size="16" font-weight="700">Nous Cloud</text>

  <!-- ============ OPEN SOURCE icons (green) ============ -->
  <g stroke="#10B981" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- get_context: document -->
    <g transform="translate(67,98)">
      <rect x="6" y="2" width="18" height="26" rx="2"/>
      <line x1="10" y1="9" x2="20" y2="9"/><line x1="10" y1="14" x2="20" y2="14"/><line x1="10" y1="19" x2="17" y2="19"/>
    </g>
    <!-- get_account: person -->
    <g transform="translate(183,98)">
      <circle cx="15" cy="9" r="5"/><path d="M5 28 C5 18 25 18 25 28"/>
    </g>
    <!-- query: magnifier -->
    <g transform="translate(299,98)">
      <circle cx="12" cy="12" r="8"/><line x1="18" y1="18" x2="27" y2="27"/>
    </g>
    <!-- identity resolution: two into one -->
    <g transform="translate(415,98)">
      <circle cx="7" cy="8" r="4"/><circle cx="7" cy="22" r="4"/><circle cx="23" cy="15" r="5"/>
      <line x1="11" y1="9.5" x2="18" y2="14"/><line x1="11" y1="20.5" x2="18" y2="16"/>
    </g>
    <!-- MCP server: stack -->
    <g transform="translate(531,98)">
      <rect x="5" y="4" width="20" height="8" rx="2"/><rect x="5" y="16" width="20" height="8" rx="2"/>
      <circle cx="9" cy="8" r="1" fill="#10B981"/><circle cx="9" cy="20" r="1" fill="#10B981"/>
    </g>
    <!-- integrations: grid -->
    <g transform="translate(647,98)" fill="#10B981" stroke="none">
      <circle cx="8" cy="8" r="2"/><circle cx="15" cy="8" r="2"/><circle cx="22" cy="8" r="2"/>
      <circle cx="8" cy="15" r="2"/><circle cx="15" cy="15" r="2"/><circle cx="22" cy="15" r="2"/>
      <circle cx="8" cy="22" r="2"/><circle cx="15" cy="22" r="2"/><circle cx="22" cy="22" r="2"/>
    </g>
  </g>

  <!-- ============ CLOUD icons (violet) ============ -->
  <g stroke="#7C3AED" stroke-width="1.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- CRM sync: circular arrows -->
    <g transform="translate(763,98)">
      <path d="M7 10 A8 8 0 0 1 23 12"/><path d="M20 8 L24 12 L20 15"/>
      <path d="M23 20 A8 8 0 0 1 7 18"/><path d="M10 22 L6 18 L10 15"/>
    </g>
    <!-- Lead Lists: checklist -->
    <g transform="translate(879,98)">
      <rect x="4" y="5" width="5" height="5" rx="1"/><line x1="13" y1="7.5" x2="26" y2="7.5"/>
      <rect x="4" y="13" width="5" height="5" rx="1"/><line x1="13" y1="15.5" x2="26" y2="15.5"/>
      <rect x="4" y="21" width="5" height="5" rx="1"/><line x1="13" y1="23.5" x2="26" y2="23.5"/>
    </g>
    <!-- ICP model: target -->
    <g transform="translate(995,98)">
      <circle cx="15" cy="15" r="11"/><circle cx="15" cy="15" r="6"/><circle cx="15" cy="15" r="2" fill="#7C3AED"/>
    </g>
  </g>

  <!-- ============ labels ============ -->
  <g text-anchor="middle" fill="#374151" font-size="11.5" font-weight="600">
    <text x="82"   y="150">get_context</text>
    <text x="198"  y="150">get_account</text>
    <text x="314"  y="150">query</text>
    <text x="430"  y="146">Identity</text><text x="430" y="160">resolution</text>
    <text x="546"  y="150">MCP server</text>
    <text x="662"  y="146">25+</text><text x="662" y="160">integrations</text>
    <text x="778"  y="150">CRM sync</text>
    <text x="894"  y="150">Lead Lists</text>
    <text x="1010" y="150">ICP model</text>
  </g>
</svg>
