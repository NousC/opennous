<!DOCTYPE html>
<html>
<head>
  <title>OAuth Callback</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f5f5f5;
    }
    .message {
      text-align: center;
      padding: 2rem;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    .spinner {
      width: 40px;
      height: 40px;
      margin: 0 auto 1rem;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="message">
    <div class="spinner"></div>
    <p>Completing authentication...</p>
  </div>

  <script>
    // Get URL parameters
    const urlParams = new URLSearchParams(window.location.search);
    const oauthSuccess = urlParams.get('oauth_success');
    const connectionId = urlParams.get('connection_id');
    const oauthError = urlParams.get('oauth_error');
    const errorMessage = urlParams.get('error_message');

    // Send message to parent window
    if (window.opener) {
      window.opener.postMessage({
        type: 'oauth-callback',
        success: oauthSuccess === 'true',
        connectionId: connectionId,
        error: oauthError,
        errorMessage: errorMessage
      }, '*');

      // Close popup after a short delay
      setTimeout(() => {
        window.close();
      }, 500);
    } else {
      document.querySelector('.message').innerHTML = '<p>Error: Unable to communicate with parent window. Please close this window and try again.</p>';
    }
  </script>
</body>
</html>
