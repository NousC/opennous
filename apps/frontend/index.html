    <!-- FAQPage Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Nous?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nous is the GTM Context API. It unifies fragmented data across your go-to-market tools like Apollo, HubSpot, Smartlead, Gmail, and LinkedIn into a single context graph, so your agents stay context-aware about what is happening inside GTM. One call returns the whole account, over MCP or REST. No data wrangling, no fragmented stack."
          }
        },
        {
          "@type": "Question",
          "name": "How does Nous work with AI agents?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nous connects to your AI agents via MCP (compatible with Claude, Cursor, and any MCP-compatible tool) or via SDK for N8N, Make, and custom-coded workflows. Before your agent takes any GTM action, it calls Nous to get the full context on a contact or company — resolved across every tool in your GTM stack. Nous logs every agent action back so the record stays current."
          }
        },
        {
          "@type": "Question",
          "name": "How much does Nous cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nous is usage based and billed on the ops your agents make, the reads, verifies and writes to your context graph. The free plan includes 1,000 ops per month and 100 records. Start is $29 per month for 10,000 ops, Pro is $99 per month for 25,000 ops with LinkedIn engagement and lead lists, and Growth is $249 per month for 100,000 ops with CRM sync and 5 workspaces. Agencies run every client on the Partner plan. No per-seat pricing, no demo calls."
          }
        },
        {
          "@type": "Question",
          "name": "What is an op in Nous?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An op is one operation your agents make against your context graph, a read, a verify or a write. Pricing is metered on ops, so you pay for what your agents actually do rather than per seat. Each plan includes a monthly ops allowance and a records allowance, and you bring your own enrichment keys."
          }
        },
        {
          "@type": "Question",
          "name": "How is Nous different from a regular CRM like HubSpot?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "HubSpot and other CRMs are built for humans to log and read data manually. Nous is built for AI agents — it structures, synthesizes, and serves context in a format agents can consume programmatically. You don't replace HubSpot with Nous; you use HubSpot to bootstrap Nous's memory with your existing contacts, then Nous becomes the intelligence layer your agents call at runtime."
          }
        }
      ]
    }
