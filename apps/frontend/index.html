    <!-- FAQPage Schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is Nous?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nous is the context graph for agentic GTM teams. It unifies the data scattered across your go-to-market tools like Apollo, HubSpot, Smartlead, Gmail, and LinkedIn into one identity-resolved account, so your agents stay context-aware about what is happening inside GTM. One call returns the whole account, over MCP or REST. No data wrangling, no fragmented stack."
          }
        },
        {
          "@type": "Question",
          "name": "How does Nous work with AI agents?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nous connects to your AI agents via MCP (compatible with Claude, Cursor, and any MCP-compatible tool) or via SDK for N8N, Make, and custom-coded workflows. Before your agent takes any GTM action, it calls Nous to get the full context on a contact or company — resolved across every tool in your GTM stack. Nous logs every agent action back so the record stays current."
          }
        },
        {
          "@type": "Question",
          "name": "How much does Nous cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Nous is billed on active accounts, the companies you have actually had a conversation with, a reply, a meeting or a DM. Retrievals, records, lead imports and seats are unlimited on every plan. Free includes 100 active accounts, Start is $29 per month for 500, and Pro is $99 per month for 2,500. Custom is the sales-led plan for GTM teams, adding the in-app agent, Tasks, Skills, and Salesforce, HubSpot and Slack. No per-seat pricing, no demo calls to start."
          }
        },
        {
          "@type": "Question",
          "name": "What counts as an active account?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "An active account is a company you have actually had a conversation with, a reply, a meeting or a DM, not a row, a lead or a person. It is the only thing Nous meters. Retrievals, records, lead imports and seats are all unlimited, because they cost nothing to serve. You import your list for free and pay for the accounts that answer."
          }
        },
        {
          "@type": "Question",
          "name": "How is Nous different from a regular CRM like HubSpot?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "HubSpot and other CRMs are built for humans to log and read data manually. Nous is built for AI agents — it structures, synthesizes, and serves context in a format agents can consume programmatically. You don't replace HubSpot with Nous; you use HubSpot to bootstrap Nous's memory with your existing contacts, then Nous becomes the intelligence layer your agents call at runtime."
          }
        }
      ]
    }
